openapi: 3.0.3
info:
  title: Plants API
  version: 1.0.0
  description: API para gerenciamento de plantas e espécies

servers:
  - url: http://localhost:8080

paths:
  /plants:
    get:
      summary: Lista todas as plantas
      tags:
        - Plants
      responses:
        '200':
          description: Lista de plantas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plant'

    post:
      summary: Cria uma nova planta
      tags:
        - Plants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plant'
      responses:
        '201':
          description: Planta criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

  /plants/{id}:
    put:
      summary: Atualiza uma planta
      tags:
        - Plants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plant'
      responses:
        '200':
          description: Planta atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

    delete:
      summary: Remove uma planta
      tags:
        - Plants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Planta removida com sucesso

  /species:
    get:
      summary: Lista todas as espécies
      tags:
        - Species
      responses:
        '200':
          description: Lista de espécies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Species'

    post:
      summary: Cria uma nova espécie
      tags:
        - Species
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Species'
      responses:
        '201':
          description: Espécie criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Species'

  /species/{id}:
    put:
      summary: Atualiza uma espécie
      tags:
        - Species
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Species'
      responses:
        '200':
          description: Espécie atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Species'

    delete:
      summary: Remove uma espécie
      tags:
        - Species
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Espécie removida com sucesso

components:
  schemas:
    Plant:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        scientificName:
          type: string
        popularName:
          type: string
        speciesId:
          type: integer
          format: int64
        luminosity:
          type: string
        total_plants:
          type: integer
          nullable: true

    Species:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        name:
          type: string